# Configuration Nginx pour Ton Cosmos (Déploiement Sans Docker / Bare-Metal)

server {
    listen 80;
    server_name toncosmos.fr www.toncosmos.fr api.toncosmos.fr;

    # Redirection HTTP vers HTTPS (à activer après génération du certificat SSL)
